name: ISTPET Backend CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore backend/backend.csproj
      
    - name: Build Expert Architecture
      run: dotnet build backend/backend.csproj --no-restore --configuration Release
      
    - name: Test (Placeholder)
      run: echo "Ejecutando pruebas unitarias si existieran..."
      
    - name: Publish Artifact
      run: dotnet publish backend/backend.csproj -c Release -o ./publish
