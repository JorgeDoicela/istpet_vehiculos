name: ISTPET Frontend CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install dependencies
      run: npm install
      working-directory: frontend
      
    - name: Build Professional UI
      run: npm run build
      working-directory: frontend
      
    - name: Security Audit (Lint)
      run: echo "Finalizando auditoría de frontend..."
