services:
  db:
    image: mariadb:10.11
    container_name: zenith_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: zenith_root_2026
      MYSQL_DATABASE: istpet_vehiculos
    ports:
      - "3307:3306"
    volumes:
      - ./docs/Scripts/01_ISTPET_LOGISTICS_SCHEMA.sql:/docker-entrypoint-initdb.d/01_ISTPET_LOGISTICS_SCHEMA.sql:ro
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zenith_backend
    restart: always
    depends_on:
      - db
    environment:
      # Development: expone /swagger para revisiĂ³n local con Docker. En despliegue serio usar Production.
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - "ConnectionStrings__DefaultConnection=Server=${LOCAL_DB_HOST};Port=${LOCAL_DB_PORT};Database=${LOCAL_DB_NAME};Uid=${LOCAL_DB_USER};Pwd=${LOCAL_DB_PASS};"
      - "ConnectionStrings__SigafiConnection=Server=${REMOTE_SIGAFI_SERVER};Port=${REMOTE_SIGAFI_PORT};Database=${REMOTE_SIGAFI_DB};Uid=${REMOTE_SIGAFI_USER};Pwd=${REMOTE_SIGAFI_PASS};"
      - "CentralDbName=${REMOTE_SIGAFI_DB}"
    ports:
      - "5112:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5112/api
    container_name: zenith_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:5112

volumes:
  db_data:
