services:
  db:
    image: mariadb:10.11
    container_name: istpet_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${LOCAL_DB_PASS}
      MYSQL_DATABASE: ${LOCAL_DB_NAME:-istpet_vehiculos}
    ports:
      - "${LOCAL_DB_PORT:-3306}:3306"
    volumes:
      - ./docs/Scripts/01_ISTPET_LOGISTICS_SCHEMA.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: istpet_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_HTTP_PORTS=8080
      - "ConnectionStrings__DefaultConnection=Server=${LOCAL_DB_HOST:-db};Port=3306;Database=${LOCAL_DB_NAME:-istpet_vehiculos};Uid=${LOCAL_DB_USER:-root};Pwd=${LOCAL_DB_PASS};"
      - "ConnectionStrings__SigafiConnection=Server=${REMOTE_SIGAFI_SERVER};Port=${REMOTE_SIGAFI_PORT:-3306};Database=${REMOTE_SIGAFI_DB:-sigafi_es};Uid=${REMOTE_SIGAFI_USER};Pwd=${REMOTE_SIGAFI_PASS};"
      - JWT_KEY=${JWT_KEY}
      - "CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}"
      - "SigafiMirrorSync__Enabled=${SIGAFI_SYNC_ENABLED:-true}"
      - "SigafiMirrorSync__IntervalMinutes=${SIGAFI_SYNC_INTERVAL:-15}"
    ports:
      - "${BACKEND_PORT:-5112}:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5112/api}
    container_name: istpet_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  db_data:
