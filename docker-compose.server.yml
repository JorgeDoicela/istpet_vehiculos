services:
  backend:
    image: istpet/backend:release
    container_name: istpet_backend
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_HTTP_PORTS=8080
      - DATABASE_MODE=${DATABASE_MODE:-Direct}
      - "ConnectionStrings__DefaultConnection=Server=${LOCAL_DB_HOST};Port=${LOCAL_DB_PORT:-3306};Database=${LOCAL_DB_NAME:-istpet_vehiculos};Uid=${LOCAL_DB_USER};Pwd=${LOCAL_DB_PASS};"
      - "ConnectionStrings__SigafiConnection=Server=${REMOTE_SIGAFI_SERVER};Port=${REMOTE_SIGAFI_PORT:-3306};Database=${REMOTE_SIGAFI_DB:-sigafi_es};Uid=${REMOTE_SIGAFI_USER};Pwd=${REMOTE_SIGAFI_PASS};"
      - JWT_KEY=${JWT_KEY}
      - "CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}"
      - "SigafiMirrorSync__Enabled=${SIGAFI_SYNC_ENABLED:-false}"
      - "SigafiMirrorSync__IntervalMinutes=${SIGAFI_SYNC_INTERVAL:-15}"
    ports:
      - "${BACKEND_PORT:-5112}:8080"

  frontend:
    image: istpet/frontend:release
    container_name: istpet_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
